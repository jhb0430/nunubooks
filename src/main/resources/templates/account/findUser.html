		<script layout:fragment="script">
		
		$(document).ready(function(){

			
			
			function maskingInfo(str) {
			    if (!str) return "";

			    //이메일인
			    if (str.includes('@')) {
			    	let [id, domain] = str.split('@');
			    	let lastDotIdx = domain.lastIndexOf('.');
			        let site = domain.substring(0, lastDotIdx);
			        let extension = domain.substring(lastDotIdx); //
			        
			        // 아이디 앞 3글자 + *** + 마지막 1글자
			        let maskedId = id;
			        if (id.length >=3) {
			            maskedId = id.substring(0, 2) + "*".repeat(id.length - 3) + id.slice(-1);
			        }

			        // nunubooks -> nu***ks
			        let maskedSite = site;
			        if (site.length >= 5) { // 최소 5글자는 되어야 중간을 가림
			            maskedSite = site.substring(0, 2) + "*".repeat(site.length - 4) + site.slice(-2);
			        } else if (site.length > 2) { // 짧은 경우(예: abc)는 앞 2글자만 노출
			            maskedSite = site.substring(0, 2) + "*".repeat(site.length - 2);
			        }

			        return maskedId + "@" + maskedSite + extension;
			    }

			    // 일반 아이디인 경우앞 3글자 + *** + 마지막 1글자
			    if (str.length > 3) {
			        return str.substring(0, 2) + "*".repeat(str.length - 3) + str.slice(-1);
			    }

			    return str; 
			}
			

			// 비밀번호 찾기 -> 버튼을 누르면 비밀번호 새로 설정할 수 있게 해야함...냅다 비번 알려주면 x 
			
			const email_regex = /^[^\s@]+@[^\s@]+.[^\s@]+$/; // 맞으면 true로 받음 
			//const phone_regex = /^[0-9]{10,11}$/;
			const phone_regex =  /^\d{2,3}-\d{3,4}-\d{4}$/;
			
			
			 // 이메일 ,휴대폰 유효성 검사
		    function validateId(userInfo) {
		        if (email_regex.test(userInfo) || phone_regex.test(userInfo)) { // 이메일이나 전화번호 형식이면
		            return true; // 트루
		        }
		        return false;	// 둘 다 만족 안하면 false
		    }
			 
			 
			 function toggleAccordion(btnId,targetId){
				 $(btnId).on("click", function() {
	           		 const $target = $(targetId);
			 
	           	// 이미 열려있는 경우 -> 닫기
	                 if (!$target.hasClass('d-none')) {
	                     $target.slideUp(300, function() {
	                         $(this).addClass('d-none');
	                     });
	                     $(this).removeClass('active');
	                 } 
	                 // 닫혀있는 경우 -> 열기
	                 else {
	                     // (선택사항) 다른 게 열려있으면 닫고 싶을 때 아래 주석 해제
	                     // $(".accordion-content").not($target).slideUp(300).addClass('d-none');
	                     // $(".btn-accordion").not($(this)).removeClass('active');

	                     $target.hide().removeClass('d-none').slideDown(300);
	                     $(this).addClass('active');
	                     $target.find("input").prop("disabled", false);
	                 }
	             });
	           		 
	           		 
			 }
			 
			 
			 
			
		 // 탭 전환 이벤트
		    $('#tabId').on('click', function() {
		        $(this).addClass('active');
		        $('#tabPw').removeClass('active');
		        $('#sectionId').removeClass('d-none');
		        $('#sectionPw').addClass('d-none');
		    });

		    $('#tabPw').on('click', function() {
		        $(this).addClass('active');
		        $('#tabId').removeClass('active');
		        $('#sectionPw').removeClass('d-none');
		        $('#sectionId').addClass('d-none');
		    });
		    
		    
		    toggleAccordion("#findUserbyEmailBtn", "#findbyEmail");
		    toggleAccordion("#findUserbyPhoneBtn", "#findbyPhone");
		    toggleAccordion("#newSetPwBtn", "#updatePw");
			
		 /*   
			$("#findUserbyEmailBtn").on("click",function(){
				$("#findbyEmail").removeClass("d-none").find("input").prop("disabled", false);
				$("#findbyPhone").addClass("d-none").find("input").prop("disabled", true);
			});
			
			$("#findUserbyPhoneBtn").on("click",function(){
				$("#findbyPhone").removeClass("d-none").find("input").prop("disabled", false);
				$("#findbyEmail").addClass("d-none").find("input").prop("disabled", true);

			});
			$("#newSetPwBtn").on("click",function(){
				$("#updatePw").removeClass("d-none");
				$("#findbyEmail").addClass("d-none");
				$("#findbyPhone").addClass("d-none");

			});
			 
		*/	 
			
			$(".findBtn").on("click",function(){

			    // 1. 클릭된 버튼이 속한 부모 div(findbyEmail 또는 findbyPhone)를 찾습니다.
			    let $parentContainer = $(this).closest(".d-none, div[id^='findby']"); 
			    
			    // 2. 그 부모 안에서만 input 값을 찾습니다.
			    let name = $parentContainer.find(".userNameInput").val();
			    let userInfo = $parentContainer.find(".findInfoInput").val();
			    
			    if(name == "" || name === undefined){
			        alert("이름을 입력해주세요");
			        return;
			    }
			    if(!validateId(userInfo)){
			        alert("유효하지 않은 양식입니다");
			        return;
			    }
				    
				/*
				let name =$(".userNameInput").val();
				let userInfo = $(".findInfoInput").val();
				
				
				if(name == ""){
					alert("이름을 입력해주세요");
					return;
				}
				if(!validateId(userInfo)){
					alert("유효하지 않은 양식입니다");
					return;
				}
				*/
				
				console.log("name:", name);
				console.log("userInfo:", userInfo);
				
				$.ajax({
					type:"post"
					,url:"/user/findId"
					,data:{"name":name,"userInfo":userInfo}
					,success:function(response){

						if(response.result=="success"){
							let maskedId = maskingInfo(response.loginId);
							
							$("#moreModal1").modal({
							    backdrop: 'static'
							}).modal("show");
							$("#moreModal1 .getloginId").text(maskedId);
					    } else {
					        alert("회원 정보가 없습니다. 다시 시도해주세요.");
					    }
							
					}
					,error:function(){

						alert("처리 오류");
					}
				});
			
				
				
			});
			
			
			$("#setPwBtn").on("click",function(){

				let name =$("#nameInput").val();
				let loginId = $("#idInput").val();
				let email = $("#emailInput").val();
				
				
				if(name == ""){
					alert("이름을 입력해주세요");
					return;
				}
				if(loginId == ""){
					alert("아이디를 입력해주세요");
					return;
				}
				if(email == ""){
					alert("이메일을 입력해주세요");
					return;
				}
				
				$.ajax({
					type:"post"
					,url:"/send-email"
					,data:{"name":name,"loginId":loginId,"email":email}
					,success:function(response){

						if(response.result){
							let maskedEmail = maskingInfo(email);
							
							$("#moreModal2").modal({
							    backdrop: 'static'
							}).modal("show");
				//			$("#moreModal2").modal("show");
							$("#moreModal2 .getEmail").text(maskedEmail);
					    } else {
					        alert("회원 정보가 없습니다. 다시 시도해주세요.");
					    }
							
					}
					,error:function(){

						alert("처리 오류");
					}
				});
			
				
				
			});
			
			
			
		
		
		
		});
		
		
		</script>
